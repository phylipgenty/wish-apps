<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Wishbridge</title>
    <link rel="stylesheet" href="/styles/main.css">

    <style>
        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 16px;
            border: 1px solid #ddd;
        }

        button {
            background: #8a2be2;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 40px;
            cursor: pointer;
        }

        .error { color: red; }
        .success { color: green; }

        ul {
            text-align: left;
            font-size: 11px;
            color: #666;
            margin-bottom: 10px;
            padding-left: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🔑 Reset Your Password</h2>

    <!-- NEW PASSWORD -->
    <input type="password" id="new-password" placeholder="New password" required>

    <div id="password-strength"
        style="font-size: 12px; margin-top: -5px; margin-bottom: 8px;">
    </div>

    <ul id="password-requirements">
        <li id="req-length">✓ 8+ characters</li>
        <li id="req-upper">✓ Uppercase letter</li>
        <li id="req-lower">✓ Lowercase letter</li>
        <li id="req-digit">✓ Digit</li>
        <li id="req-special">✓ Special character (!@#$%^&*)</li>
    </ul>

    <!-- CONFIRM PASSWORD -->
    <input type="password" id="confirm-password" placeholder="Confirm new password" required>

    <button id="reset-btn">Reset Password</button>

    <p id="message"></p>
    <a href="/login.html" class="back-link">← Back to Login</a>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    const passwordInput = document.getElementById('new-password');
    const strengthDiv = document.getElementById('password-strength');
    const message = document.getElementById('message');

    if (!token) {
        message.innerText = 'Invalid or missing reset token.';
        document.getElementById('reset-btn').disabled = true;
    }

    function updatePasswordStrength() {
        const pwd = passwordInput.value;

        let checks = {
            length: pwd.length >= 8,
            upper: /[A-Z]/.test(pwd),
            lower: /[a-z]/.test(pwd),
            digit: /[0-9]/.test(pwd),
            special: /[!@#$%^&*]/.test(pwd)
        };

        document.getElementById('req-length').style.color = checks.length ? 'green' : '#999';
        document.getElementById('req-upper').style.color = checks.upper ? 'green' : '#999';
        document.getElementById('req-lower').style.color = checks.lower ? 'green' : '#999';
        document.getElementById('req-digit').style.color = checks.digit ? 'green' : '#999';
        document.getElementById('req-special').style.color = checks.special ? 'green' : '#999';

        let score = Object.values(checks).filter(Boolean).length;
        const labels = ['Very weak', 'Weak', 'Fair', 'Good', 'Strong'];
        const colors = ['#ff4444', '#ff8844', '#ffcc00', '#88cc44', '#44cc44'];

        strengthDiv.textContent = labels[score - 1] || 'Very weak';
        strengthDiv.style.color = colors[score - 1] || '#ff4444';

        return checks.length && checks.upper && checks.lower && checks.digit && checks.special;
    }

    passwordInput.addEventListener('input', updatePasswordStrength);

    document.getElementById('reset-btn').addEventListener('click', async () => {
        const newPass = passwordInput.value;
        const confirm = document.getElementById('confirm-password').value;

        message.className = '';
        message.innerText = '';

        if (newPass !== confirm) {
            message.className = 'error';
            message.innerText = 'Passwords do not match.';
            return;
        }

        if (!updatePasswordStrength()) {
            message.className = 'error';
            message.innerText = 'Password does not meet security requirements.';
            return;
        }

        // 🔁 Use query parameters (backend expects token and new_password as query params)
        const url = `https://wish-apps.onrender.com/users/reset-password?token=${encodeURIComponent(token)}&new_password=${encodeURIComponent(newPass)}`;

        try {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
                // No body
            });

            const data = await res.json();

            if (res.ok) {
                message.className = 'success';
                message.innerText = data.message + ' Redirecting...';

                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
            } else {
                // Handle array of errors (FastAPI validation)
                let errorMsg = data.detail;
                if (Array.isArray(errorMsg)) {
                    errorMsg = errorMsg.map(e => e.msg).join(', ');
                } else if (typeof errorMsg === 'object') {
                    errorMsg = errorMsg.message || 'Reset failed.';
                }
                message.className = 'error';
                message.innerText = errorMsg;
            }
        } catch (err) {
            message.className = 'error';
            message.innerText = 'Network error. Try again.';
        }
    });
</script>

</body>
</html>
