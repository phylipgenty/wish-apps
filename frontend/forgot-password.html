<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Wishbridge</title>
    <link rel="stylesheet" href="/styles/main.css">
    <style>
        .container { max-width: 500px; margin: 50px auto; padding: 20px; background: white; border-radius: 32px; box-shadow: 0 12px 30px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 16px; border: 1px solid #ddd; }
        button { background: #8a2be2; color: white; border: none; padding: 12px; width: 100%; border-radius: 40px; cursor: pointer; }
        .back-link { display: block; margin-top: 20px; color: #8a2be2; }
    </style>
</head>
<body>
<div class="container">
    <h2>🔐 Forgot Password</h2>
    <p>Enter your email address and we'll send you a reset link.</p>
    <input type="email" id="email" placeholder="your@email.com" required>
    <button id="reset-btn">Send Reset Link</button>
    <a href="/login.html" class="back-link">← Back to Login</a>
    <p id="message"></p>
</div>
<script>
    const resetBtn = document.getElementById('reset-btn');
    const messageP = document.getElementById('message');

    resetBtn.addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        if (!email) {
            messageP.innerText = '❌ Please enter your email address.';
            return;
        }

        // Disable button and show loading text
        resetBtn.disabled = true;
        const originalBtnText = resetBtn.innerText;
        resetBtn.innerText = '⏳ Sending...';

        try {
            const res = await fetch('https://wish-apps.onrender.com/users/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });

            const data = await res.json();

            if (res.ok) {
                messageP.innerText = data.message || '✅ Check your email for the reset link.';
                messageP.style.color = 'green';
                // Keep button disabled to prevent spam
                resetBtn.innerText = 'Sent';
            } else {
                messageP.innerText = data.detail || '⚠️ Something went wrong. Please try again.';
                messageP.style.color = 'red';
                resetBtn.disabled = false;
                resetBtn.innerText = originalBtnText;
            }
        } catch (err) {
            console.error('Fetch error:', err);
            messageP.innerText = '🌐 Network error. Is the backend running?';
            messageP.style.color = 'red';
            resetBtn.disabled = false;
            resetBtn.innerText = originalBtnText;
        }
    });
</script>
</body>
</html>
